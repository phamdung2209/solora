name: Deploy to GitHub Pages

# Auto-deploys the site (landing + per-app privacy/terms) to GitHub Pages on every
# push to main. One-time: repo â†’ Settings â†’ Pages â†’ Source = "GitHub Actions".
# NOTE: free GitHub Pages needs a PUBLIC repo (private-repo Pages requires GitHub Pro).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
